name: CI

# Type-check the frontend and run the Rust tests on every PR to main, so
# breakage is caught before merge (and thus before the release build runs).
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      # `npm run build` runs `tsc` (type-check) then `vite build`, and produces
      # `dist/`, which the Rust `tauri::generate_context!` codegen needs to compile.
      - name: Type-check + build frontend
        run: npm run build

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test
