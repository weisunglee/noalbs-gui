name: Release

# Versioned releases, NOALBS-style: push a `vX.Y.Z` tag to cut a release.
# CI builds one portable, run-directly archive per platform and publishes an
# immutable release tagged with that version (shown with the version on the
# repo homepage). Cut one with:  npm version <patch|minor|...> && git push --follow-tags
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build, e.g. v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Create release (if it doesn't exist yet)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --latest \
              --generate-notes
          fi

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: macos-latest,   target: aarch64-apple-darwin,      kind: macos }
          - { platform: macos-latest,   target: x86_64-apple-darwin,       kind: macos }
          - { platform: ubuntu-22.04,   target: x86_64-unknown-linux-gnu,  kind: linux }
          - { platform: windows-latest, target: x86_64-pc-windows-msvc,    kind: windows }
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.kind == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Build (portable)
        shell: bash
        run: |
          if [ "${{ matrix.kind }}" = "windows" ]; then
            npm run tauri build -- --target ${{ matrix.target }} --no-bundle
          elif [ "${{ matrix.kind }}" = "macos" ]; then
            npm run tauri build -- --target ${{ matrix.target }} --bundles app
          else
            npm run tauri build -- --target ${{ matrix.target }} --bundles appimage
          fi

      - name: Package & upload (macOS / Linux)
        if: matrix.kind != 'windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          t="${{ matrix.target }}"
          rel="src-tauri/target/$t/release"
          if [ "${{ matrix.kind }}" = "macos" ]; then
            out="noalbs-gui-$TAG-$t.tar.gz"
            app=$(ls -d "$rel"/bundle/macos/*.app | head -1)
            tar -czf "$out" -C "$rel/bundle/macos" "$(basename "$app")"
          else
            app=$(ls "$rel"/bundle/appimage/*.AppImage | head -1)
            out="noalbs-gui-$TAG-$t.AppImage"
            cp "$app" "$out"
          fi
          gh release upload "$TAG" "$out" --clobber --repo "$GITHUB_REPOSITORY"

      - name: Package & upload (Windows)
        if: matrix.kind == 'windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          $t = "${{ matrix.target }}"
          $rel = "src-tauri/target/$t/release"
          $exe = Get-ChildItem "$rel" -Filter *.exe | Sort-Object Length -Descending | Select-Object -First 1
          if (-not $exe) { throw "no .exe found in $rel" }
          $out = "noalbs-gui-$env:TAG-$t.zip"
          Compress-Archive -Path $exe.FullName -DestinationPath $out -Force
          gh release upload $env:TAG $out --clobber --repo $env:GITHUB_REPOSITORY
