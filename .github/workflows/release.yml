name: Release (rolling latest)

# On every push to main (i.e. every merged PR), build ONE portable archive per
# platform and refresh a single rolling "latest" pre-release, so users always
# have a current, run-directly download without building from source.
#
# Assets (mirrors NOALBS's lean, portable releases — no installers):
#   - noalbsgui-<ver>-x86_64-pc-windows-msvc.zip   (NOALBSGUI.exe inside)
#   - noalbsgui-<ver>-aarch64-apple-darwin.tar.gz  (NOALBSGUI.app inside)
#   - noalbsgui-<ver>-x86_64-apple-darwin.tar.gz   (NOALBSGUI.app inside)
#   - noalbsgui-<ver>-x86_64-unknown-linux-gnu.AppImage
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-latest
  cancel-in-progress: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Recreate the rolling release fresh at the current commit (drop stale
      # assets). Non-draft so the matrix jobs can upload by tag. Tolerate
      # first-run absence.
      - name: Reset 'latest' release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --cleanup-tag --yes --repo "$GITHUB_REPOSITORY" || true
          gh release create latest \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Latest build" \
            --prerelease \
            --notes "Automated build of the latest \`main\` (commit ${GITHUB_SHA:0:7}). Portable, **unsigned** builds — macOS Gatekeeper / Windows SmartScreen may warn; see the README."

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: macos-latest,   target: aarch64-apple-darwin,      kind: macos }
          - { platform: macos-latest,   target: x86_64-apple-darwin,       kind: macos }
          - { platform: ubuntu-22.04,   target: x86_64-unknown-linux-gnu,  kind: linux }
          - { platform: windows-latest, target: x86_64-pc-windows-msvc,    kind: windows }
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.kind == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Build (portable)
        shell: bash
        run: |
          if [ "${{ matrix.kind }}" = "windows" ]; then
            npm run tauri build -- --target ${{ matrix.target }} --no-bundle
          elif [ "${{ matrix.kind }}" = "macos" ]; then
            npm run tauri build -- --target ${{ matrix.target }} --bundles app
          else
            npm run tauri build -- --target ${{ matrix.target }} --bundles appimage
          fi

      - name: Package & upload (macOS / Linux)
        if: matrix.kind != 'windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ver=$(node -p "require('./package.json').version")
          t="${{ matrix.target }}"
          rel="src-tauri/target/$t/release"
          if [ "${{ matrix.kind }}" = "macos" ]; then
            out="noalbsgui-$ver-$t.tar.gz"
            tar -czf "$out" -C "$rel/bundle/macos" NOALBSGUI.app
          else
            app=$(ls "$rel"/bundle/appimage/*.AppImage | head -1)
            out="noalbsgui-$ver-$t.AppImage"
            cp "$app" "$out"
          fi
          gh release upload latest "$out" --clobber --repo "$GITHUB_REPOSITORY"

      - name: Package & upload (Windows)
        if: matrix.kind == 'windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          $t = "${{ matrix.target }}"
          $rel = "src-tauri/target/$t/release"
          $exe = Get-ChildItem "$rel" -Filter *.exe | Sort-Object Length -Descending | Select-Object -First 1
          if (-not $exe) { throw "no .exe found in $rel" }
          $out = "noalbsgui-$ver-$t.zip"
          Compress-Archive -Path $exe.FullName -DestinationPath $out -Force
          gh release upload latest $out --clobber --repo $env:GITHUB_REPOSITORY
